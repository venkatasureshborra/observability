mode: daemonset
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.102.1"

# 🔥 THIS REPLACES DEFAULT CONFIG COMPLETELY
alternateConfig:

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch: {}

  exporters:
    loki:
      endpoint: http://loki:3100/loki/api/v1/push

    otlp/tempo:
      endpoint: tempo:4317
      tls:
        insecure: true

    prometheus:
      endpoint: "0.0.0.0:8890"

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]

    pipelines:
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [loki]

      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]

      metrics:
        receivers: [otlp]
        processors: [batch]
        exporters: [prometheus]
