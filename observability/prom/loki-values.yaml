deploymentMode: SingleBinary

loki:
  auth_enabled: false
  limits_config:
    allow_structured_metadata: false 
  commonConfig:
    replication_factor: 1

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin

    s3:
      endpoint: minio.observability.svc.cluster.local:9000
      accessKeyId: minio
      secretAccessKey: minio123
      s3ForcePathStyle: true
      insecure: true

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

singleBinary:
  replicas: 1

# 🔥 DISABLE scalable components explicitly
read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

resources:
  requests:
    memory: 1Gi
    cpu: 300m
