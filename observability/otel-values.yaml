mode: deployment

image:
  repository: "otel/opentelemetry-collector-contrib"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  exporters:
    # 📍 Route 1: Send Traces to Jaeger
    otlp/jaeger:
      endpoint: "jaeger-collector.tracing.svc.cluster.local:4317"
      tls:
        insecure: true
        
    # 📍 Route 2: Send Logs to Loki using the NATIVE OTLP protocol!
    otlphttp/loki:
      endpoint: "http://loki.logging.svc.cluster.local:3100/otlp"
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        exporters: [otlp/jaeger]
      # Route the logs using the new exporter
      logs: 
        receivers: [otlp]
        exporters: [otlphttp/loki]

# Expose the OTLP ports so the microservices can reach the collector
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
