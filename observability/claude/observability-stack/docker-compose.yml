version: "3.9"

# ============================================================
# Production-Grade Observability Stack
# Components: Prometheus, Grafana, Loki, Tempo, MinIO (S3),
#             OpenTelemetry Collector, Alertmanager
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  observability:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
  minio_data:
  alertmanager_data:

services:

  # ─────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage (Loki & Tempo chunks)
  # ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      observability:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # Create MinIO buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-25-11Z
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - observability
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb --ignore-existing myminio/loki-chunks;
        mc mb --ignore-existing myminio/loki-ruler